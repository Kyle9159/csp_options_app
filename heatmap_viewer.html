<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options Chain Heatmap Visualizer</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .control-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .control-group {
            flex: 1;
            min-width: 200px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-group input,
        .control-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .control-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: #4CAF50;
            background: rgba(255, 255, 255, 0.2);
        }

        .control-group select option {
            background: #2a5298;
            color: #ffffff;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .visualization-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-height: 600px;
        }

        #heatmapPlot {
            width: 100%;
            height: 700px;
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            display: none;
        }

        .info-panel.show {
            display: block;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
        }

        .info-card h4 {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .info-card p {
            font-size: 1.3em;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 2px solid #f44336;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .error h3 {
            color: #f44336;
            margin-bottom: 10px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .max-pain-indicator {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            display: inline-block;
            box-shadow: 0 2px 10px rgba(255, 107, 107, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Dashboard</a>

        <div class="header">
            <h1>Options Chain Heatmap Visualizer</h1>
            <p>Interactive visualization of options data - Open Interest, Volume, Greeks, and more</p>
        </div>

        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <label for="symbolInput">Symbol</label>
                    <input type="text" id="symbolInput" placeholder="SPY" value="SPY">
                </div>

                <div class="control-group">
                    <label for="vizTypeSelect">Visualization Type</label>
                    <select id="vizTypeSelect">
                        <option value="open_interest">Open Interest</option>
                        <option value="volume">Volume</option>
                        <option value="liquidity">Liquidity Analysis</option>
                        <option value="iv_surface">IV Surface (3D)</option>
                        <option value="delta">Delta Heatmap</option>
                        <option value="gamma">Gamma Heatmap</option>
                        <option value="theta">Theta Heatmap</option>
                        <option value="vega">Vega Heatmap</option>
                        <option value="dashboard">Dashboard (4-Panel)</option>
                    </select>
                </div>

                <div class="control-group">
                    <button class="btn btn-primary" onclick="loadHeatmap()">Generate Heatmap</button>
                </div>

                <div class="control-group">
                    <button class="btn btn-secondary" onclick="refreshData()">Refresh Data</button>
                </div>
            </div>
        </div>

        <div class="visualization-container">
            <div id="loadingMessage" class="loading" style="display: none;">
                <div class="loading-spinner"></div>
                <p>Loading options chain data...</p>
            </div>
            <div id="errorMessage" style="display: none;"></div>
            <div id="heatmapPlot"></div>
        </div>

        <div id="infoPanel" class="info-panel">
            <h3>Chain Analysis</h3>
            <div class="info-grid">
                <div class="info-card">
                    <h4>Max Pain</h4>
                    <p id="maxPainValue">-</p>
                </div>
                <div class="info-card">
                    <h4>Most Liquid Strike</h4>
                    <p id="mostLiquidStrike">-</p>
                </div>
                <div class="info-card">
                    <h4>Current Price</h4>
                    <p id="currentPrice">-</p>
                </div>
                <div class="info-card">
                    <h4>Total Calls OI</h4>
                    <p id="totalCallsOI">-</p>
                </div>
                <div class="info-card">
                    <h4>Total Puts OI</h4>
                    <p id="totalPutsOI">-</p>
                </div>
                <div class="info-card">
                    <h4>Put/Call Ratio</h4>
                    <p id="putCallRatio">-</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load heatmap on page load with default symbol
        window.addEventListener('DOMContentLoaded', () => {
            loadHeatmap();
        });

        // Allow Enter key to trigger load
        document.getElementById('symbolInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadHeatmap();
            }
        });

        async function loadHeatmap() {
            const symbol = document.getElementById('symbolInput').value.toUpperCase().trim();
            const vizType = document.getElementById('vizTypeSelect').value;

            if (!symbol) {
                showError('Please enter a valid symbol');
                return;
            }

            showLoading();
            hideError();

            try {
                // Fetch heatmap data
                const response = await fetch(`/api/chain_heatmap/${symbol}?viz_type=${vizType}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                // Render heatmap
                if (data.heatmap) {
                    const plotData = JSON.parse(data.heatmap);
                    Plotly.newPlot('heatmapPlot', plotData.data, plotData.layout, {responsive: true});
                }

                // Update info panel
                updateInfoPanel(data);

                hideLoading();

            } catch (error) {
                console.error('Error loading heatmap:', error);
                showError(`Failed to load heatmap: ${error.message}`);
                hideLoading();
            }
        }

        function updateInfoPanel(data) {
            const infoPanel = document.getElementById('infoPanel');

            if (data.max_pain) {
                document.getElementById('maxPainValue').innerHTML =
                    `<span class="max-pain-indicator">$${data.max_pain.toFixed(2)}</span>`;
            }

            if (data.liquidity_analysis) {
                const liquid = data.liquidity_analysis.most_liquid_strike;
                document.getElementById('mostLiquidStrike').textContent =
                    liquid ? `$${liquid.toFixed(2)}` : 'N/A';
            }

            if (data.current_price) {
                document.getElementById('currentPrice').textContent = `$${data.current_price.toFixed(2)}`;
            }

            if (data.total_calls_oi !== undefined) {
                document.getElementById('totalCallsOI').textContent =
                    data.total_calls_oi.toLocaleString();
            }

            if (data.total_puts_oi !== undefined) {
                document.getElementById('totalPutsOI').textContent =
                    data.total_puts_oi.toLocaleString();
            }

            if (data.put_call_ratio !== undefined) {
                document.getElementById('putCallRatio').textContent =
                    data.put_call_ratio.toFixed(2);
            }

            infoPanel.classList.add('show');
        }

        function refreshData() {
            loadHeatmap();
        }

        function showLoading() {
            document.getElementById('loadingMessage').style.display = 'block';
            document.getElementById('heatmapPlot').style.display = 'none';
        }

        function hideLoading() {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('heatmapPlot').style.display = 'block';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.innerHTML = `
                <div class="error">
                    <h3>Error</h3>
                    <p>${message}</p>
                </div>
            `;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }
    </script>
</body>
</html>
